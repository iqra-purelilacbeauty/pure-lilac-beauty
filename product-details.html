        use: "Use shades individually or blend together."
    }

// Get the product ID from the link
var linkInfo = window.location.search;
var chosenID = linkInfo.substring(4); // Removes "?id=" from the text

// Find the matching product
var currentProduct = allProducts[0]; // Default to first product
for (var i = 0; i < allProducts.length; i++) {
    if (allProducts[i].id == chosenID) {
        currentProduct = allProducts[i];
        break;
    }
}

// Put the product details onto the page
document.getElementById("productImage").src = currentProduct.image;
document.getElementById("productImage").alt = currentProduct.name;
document.getElementById("productName").textContent = currentProduct.name;
document.getElementById("productPrice").textContent = currentProduct.price;
document.getElementById("productDesc").textContent = currentProduct.description;
document.getElementById("productUse").textContent = currentProduct.use;

// Add shade circles
var shadeBox = document.getElementById("productShades");
shadeBox.innerHTML = "";
for (var s = 0; s < currentProduct.shades.length; s++) {
    var newShade = document.createElement("span");
    newShade.className = "circle " + currentProduct.shades[s];
    shadeBox.appendChild(newShade);
}

// Add benefit list items
var benefitBox = document.getElementById("productBenefits");
benefitBox.innerHTML = "";
for (var b = 0; b < currentProduct.benefits.length; b++) {
    var newBenefit = document.createElement("li");
    newBenefit.textContent = currentProduct.benefits[b];
    benefitBox.appendChild(newBenefit);
}

// Set basket button details
var btn = document.getElementById("basketBtn");
btn.setAttribute("data-name", currentProduct.name);
btn.setAttribute("data-price", currentProduct.price.replace("£", ""));
btn.setAttribute("data-image", currentProduct.image);
</script>
