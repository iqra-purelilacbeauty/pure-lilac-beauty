<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile | Pure Lilac Beauty</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="moving-logo">
    <img src="images/logo.png" alt="Pure Lilac Beauty Logo">
</div>
<header class="top-header">

<div class="logo">
<h1>Pure Lilac Beauty</h1>
</div>

<div class="search">
<input type="text" placeholder="Search products...">
</div>

<div class="icons">
<a href="profile.html">👤</a>
<a href="basket.html">🛒</a>

<div class="dropdown">

<button class="menu-button">☰</button>

<div class="dropdown-content">
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="contact.html">Contact</a>
</div>

</div>

</div>

</header>


<section class="profile">

<h2>My Profile</h2>

<h3>Welcome!</h3>

<form id="profileForm">

<label for="name">Name:</label><br>
<input type="text" id="name" name="name" value="Guest User"><br><br>

<label for="email">Email:</label><br>
<input type="email" id="email" name="email" value="guest@email.com"><br><br>

<button type="submit">Save Changes</button>

</form>

</section>
<!-- Accessibility: Text Size Controls -->
<section class="accessibility-text">
    <h3>Accessibility: Text Size</h3>
    <p>Adjust the size of text to suit your needs:</p>
    <div class="text-size-buttons">

        <button onclick="smallerText()">A-</button>
        <button onclick="resetText()">Reset</button>
        <button onclick="largerText()">A+</button>
    </div>
</section>
<footer>
    <p>Follow us:</p>

    <a href="https://www.instagram.com/yourusername" target="_blank">
        <img src="facebook.png" alt="Instagram" width="35">
    </a>

    <a href="https://www.facebook.com/yourusername" target="_blank">
        <img src="fb.png" alt="Facebook" width="35">
    </a>

    <p>© 2026 Pure Lilac Beauty</p>

    <p>
        <a href="index.html">Home</a> |
        <a href="products.html">Products</a> |
        <a href="contact.html">Contact</a>
    </p>
</footer>

<script>

let profileForm = document.getElementById("profileForm");

// Load saved details
window.onload = function(){

    if(localStorage.getItem("userName")){
        document.getElementById("name").value = localStorage.getItem("userName");
    }

    if(localStorage.getItem("userEmail")){
        document.getElementById("email").value = localStorage.getItem("userEmail");
    }

};

profileForm.addEventListener("submit", function(event){

    event.preventDefault();

    localStorage.setItem("userName", document.getElementById("name").value);

    localStorage.setItem("userEmail", document.getElementById("email").value);

    alert("Profile updated successfully!");

});

</script>

<script src="script.js"></script>

</body>

</html>
